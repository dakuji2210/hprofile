name: githubcicd
on: workflow_dispatch
env: 
  ECR_REGISTRY: ${{ secrets.REGISTRY }}
  ECR_REGISTRY_REPO: ${{ secrets.REGISTRY_REPO }}
  AWS_REGION: ${{ secrets.REGION }}  # Set your AWS region here
  ECS_CLUSTER: githubcicd-cluster  # Replace with your ECS cluster name
  ECS_SERVICE: githubcicd-task-def-service  # Replace with your ECS service name
  ECS_TASK_DEFINITION: aws-files/task-definition.json  # Replace with your ECS task definition file name
  ECS_CONTAINER_NAME: himsancontain  # Replace with your ECS container name

# This workflow is triggered by a manual dispatch event.
# It can be used to run specific tasks on demand.
# The workflow can be triggered from the GitHub Actions tab in the repository.  
jobs:
  testing:
    runs-on: ubuntu-latest
    env:
      SONAR_SCANNER_OPTS: "-Xmx1024m"  # Increase heap size to 1GB
    

    steps:
      - name: code check out
        uses: actions/checkout@v4

      - name: testing code
        run: mvn test

      - name: checkstyle code
        run: mvn checkstyle:checkstyle
        # This step checks out the repository code so that it can be used in subsequent steps.      
      - name: Set Java 11
        uses: actions/setup-java@v3
        with:
         distribution: 'temurin' # See 'Supported distributions' for available options
         java-version: '11'

      # Setup sonar-scanner
      - name: Setup SonarQube
        uses: warchant/setup-sonar-scanner@v7


        
      - name: SonarCloud Scan
        run: sonar-scanner
           -Dsonar.host.url=${{ secrets.SONAR_URL }}
           -Dsonar.login=${{ secrets.SONAR_TOKEN }}
           -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }}
           -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }}
           -Dsonar.sources=src/
           -Dsonar.junit.reportsPath=target/surefire-reports/ 
           -Dsonar.jacoco.reportsPath=target/jacoco.exec 
           -Dsonar.java.checkstyle.reportPaths=target/checkstyle-result.xml
           -Dsonar.java.binaries=target/test-classes/com/visualpathit/account/controllerTest/


      - name: SonarQube Quality Gate check
        id: sonarqube-quality-gate-check
        uses: sonarsource/sonarqube-quality-gate-action@master
        with:
          pollingTimeoutSec: 600
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_URL }} #OPTIONAL


  build_Image_Upload_ecr:
    runs-on: ubuntu-latest
    needs: testing
    env:
      AWS_REGION: us-east-1  # Set your AWS region here
      
      DB_PASS: ${{ secrets.DB_PASS }}  # Database password
    steps:
      - name: code check out
        uses: actions/checkout@v4
      - name: updating application.properties file 
        run: |
          sed -i "s/^jdbc.username.*$/jdbc.username\=${{ secrets.DB_USER }}/" src/main/resources/application.properties
          sed -i "s/^jdbc.password.*$/jdbc.password\=${{ secrets.DB_PASS }}/" src/main/resources/application.properties
          sed -i "s/db01/${{ secrets.DB_ENDPOINT }}/" src/main/resources/application.properties
      - name: Build & Upload image to ECR
        uses: appleboy/docker-ecr-action@master
        with:
         access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
         secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
         registry: ${{ secrets.REGISTRY }}
         repo: ${{ secrets.REGISTRY_REPO }}
         region: ${{ env.AWS_REGION }}
         tags: latest,${{ github.run_number }}
         daemon_off: false
         dockerfile: ./Dockerfile
         context: ./

  deploy:
    runs-on: ubuntu-latest
    needs: build_Image_Upload_ecr
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
         aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
         aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
         aws-region: ${{ env.AWS_REGION }}
      - name: Fill in the new image ID in the Amazon ECS task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ${{ env.ECS_TASK_DEFINITION }}
          container-name: ${{ env.ECS_CONTAINER_NAME }}
          image: ${{ secrets.REGISTRY }}/${{ secrets.REGISTRY_REPO }}:${{ github.run_number }}

      - name: Deploy Amazon ECS task definition
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true 
      