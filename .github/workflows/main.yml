name: githubcicd
on: workflow_dispatch
# This workflow is triggered by a manual dispatch event.
# It can be used to run specific tasks on demand.
# The workflow can be triggered from the GitHub Actions tab in the repository.  
jobs:
  testing:
    runs-on: ubuntu-latest

    env: 
        SONAR_SCANNER_OPTS: "-Xmx1024m"  # Increase heap size to 1GB

    steps:
      - name: code check out
        uses: actions/checkout@v4

      - name: testing code
        run: mvn test

      - name: checkstyle code
        run: mvn checkstyle:checkstyle
        # This step checks out the repository code so that it can be used in subsequent steps.      
      - name: Java installation
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          
      - name: Install SonarScanner CLI
        run: |
          wget https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-5.0.1.3006-linux.zip
          unzip sonar-scanner-cli-5.0.1.3006-linux.zip
          echo "${GITHUB_WORKSPACE}/sonar-scanner-5.0.1.3006-linux/bin" >> $GITHUB_PATH


        
      - name: SonarCloud Scan
        run: sonar-scanner
           -Dsonar.host.url=${{ secrets.SONAR_URL }}
           -Dsonar.login=${{ secrets.SONAR_TOKEN }}
           -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }}
           -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }}
           -Dsonar.sources=src/
           -Dsonar.junit.reportsPath=target/surefire-reports/ 
           -Dsonar.jacoco.reportsPath=target/jacoco.exec 
           -Dsonar.java.checkstyle.reportPaths=target/checkstyle-result.xml
           -Dsonar.java.binaries=target/test-classes/com/visualpathit/account/controllerTest/